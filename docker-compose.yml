version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: nail_app
      POSTGRES_USER: nail
      POSTGRES_PASSWORD: nail
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  app:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://nail:nail@db:5432/nail_app
      PORT: 8000
    depends_on:
      - db
    ports:
      - "8000:8000"

volumes:
  db-data:

